name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Install image optimizer
        run: npm install sharp@0.34.5 --no-save --no-audit --no-fund

      - name: Generate optimized WebP images
        run: node scripts/prepare-images.mjs

      - name: Apply hero image patch
        run: node scripts/patch-hero-image.mjs

      - name: Apply gallery order
        run: node scripts/patch-gallery-order.mjs

      - name: Apply gallery fit
        run: node scripts/patch-gallery-fit.mjs

      - name: Build site
        run: npx astro build --config astro.config.github.mjs

      - name: Fix published GitHub Pages paths
        run: node scripts/fix-pages-dist.mjs

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
